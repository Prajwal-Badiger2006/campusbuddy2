name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Java 17 is required for Android Gradle Plugin 8.x
  JAVA_VERSION: "17"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      # Install the SDK platform matching compileSdk = 36
      - name: Install Android SDK platform 36
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            > /dev/null 2>&1 || true

      # ── Create .env from GitHub Secrets ──
      # The build.gradle.kts reads GEMINI_API_KEY, FIREBASE_STORAGE_BUCKET,
      # FIREBASE_PROJECT_ID, FIREBASE_API_KEY, and FIREBASE_APP_ID from .env.
      # Set these as secrets in your GitHub repo:
      #   Settings → Secrets and variables → Actions
      - name: Create .env file from secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
          echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env
          echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env

      # The google-services.json is checked into the repo, so no extra step needed.
      # If you want to keep it out of git, uncomment the following:
      # - name: Create google-services.json from secret
      #   run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      # ── Cache Gradle ──
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # build = assemble + test + lint + check
      - name: Build and test
        run: ./gradlew build

      # ── Upload APK ──
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      # ── Upload test results ──
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          if-no-files-found: warn
